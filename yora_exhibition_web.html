<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YORA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F5F2ED;--border:#D4D0C8;--text-primary:#1C1B18;--text-secondary:#6B6860;--text-dim:#9B9890;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text-primary);font-family:"Inter",sans-serif;font-weight:100;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;opacity:0;pointer-events:none;transition:opacity 0.7s ease;}
  .screen.active{opacity:1;pointer-events:all;}

  #screen-intro{text-align:center;}
  .logo-wrap{width:200px;height:200px;margin:0 auto 24px;opacity:0;animation:fadeUp 1.2s ease 0.2s forwards;}
  .logo-wrap img{width:100%;height:100%;object-fit:contain;}
  .wordmark{font-size:clamp(28px,5vw,52px);font-weight:100;letter-spacing:0.04em;color:var(--text-primary);opacity:0;animation:fadeUp 1.2s ease 0.6s forwards;line-height:1;}
  .tagline{font-size:clamp(11px,1.5vw,13px);font-weight:200;letter-spacing:0.12em;color:var(--text-secondary);margin-top:12px;opacity:0;animation:fadeUp 1.2s ease 1s forwards;}
  .intro-desc{font-size:clamp(14px,1.8vw,18px);font-weight:100;color:var(--text-secondary);max-width:320px;line-height:1.9;opacity:0;animation:fadeUp 1.2s ease 1.7s forwards;text-align:center;margin-top:48px;}
  .btn-start{margin-top:48px;padding:13px 48px;background:transparent;border:0.5px solid var(--border);color:var(--text-secondary);font-family:"Inter",sans-serif;font-size:11px;font-weight:200;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;opacity:0;animation:fadeUp 1.2s ease 2.2s forwards;transition:border-color 0.3s,color 0.3s;}
  .btn-start:hover{border-color:var(--text-secondary);color:var(--text-primary);}
  .privacy-note{font-family:"Inter",sans-serif;font-size:10px;font-weight:200;color:var(--text-dim);letter-spacing:0.08em;line-height:1.7;text-align:center;max-width:320px;margin-top:32px;opacity:0;animation:fadeUp 1.2s ease 2.6s forwards;}
  .privacy-note strong{font-weight:300;color:var(--text-secondary);display:block;margin-bottom:4px;letter-spacing:0.12em;text-transform:uppercase;font-size:9px;}

  #screen-question{align-items:flex-start;max-width:600px;width:100%;margin:0 auto;}
  .q-progress{display:flex;gap:6px;margin-bottom:52px;align-self:stretch;}
  .q-dot{height:1px;flex:1;background:var(--border);transition:background 0.4s;}
  .q-dot.done{background:var(--text-dim);}
  .q-dot.active{background:var(--text-primary);}
  .q-num{font-size:10px;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;margin-bottom:22px;font-weight:200;}
  .q-text{font-size:clamp(20px,3.2vw,34px);font-weight:100;line-height:1.4;color:var(--text-primary);margin-bottom:44px;transition:opacity 0.4s;}
  .q-area{width:100%;}
  .text-input{width:100%;background:transparent;border:none;border-bottom:0.5px solid var(--border);color:var(--text-primary);font-family:"Inter",sans-serif;font-size:clamp(16px,2.2vw,24px);font-weight:100;padding:12px 0;outline:none;transition:border-color 0.3s;}
  .text-input::placeholder{color:var(--text-dim);}
  .text-input:focus{border-bottom-color:var(--text-secondary);}
  .choices{display:flex;gap:10px;flex-wrap:wrap;}
  .choice-btn{padding:13px 26px;background:transparent;border:0.5px solid var(--border);color:var(--text-secondary);font-family:"Inter",sans-serif;font-size:14px;font-weight:100;cursor:pointer;transition:all 0.25s;letter-spacing:0.03em;}
  .choice-btn:hover{border-color:var(--text-secondary);color:var(--text-primary);}
  .choice-btn.sel{border-color:var(--text-primary);color:var(--text-primary);background:rgba(28,27,24,0.03);}
  .slider-wrap{width:100%;}
  .slider-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);letter-spacing:0.1em;margin-bottom:20px;font-weight:200;}
  .slider{-webkit-appearance:none;width:100%;height:1px;background:var(--border);outline:none;cursor:pointer;}
  .slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text-primary);cursor:pointer;transition:transform 0.2s;}
  .slider::-webkit-slider-thumb:hover{transform:scale(1.4);}
  .slider-val{text-align:center;font-size:28px;font-weight:100;color:var(--text-primary);margin-top:20px;}
  .btn-next{margin-top:44px;padding:12px 38px;background:transparent;border:0.5px solid var(--border);color:var(--text-dim);font-family:"Inter",sans-serif;font-size:11px;font-weight:200;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;}
  .btn-next:not(:disabled):hover{border-color:var(--text-secondary);color:var(--text-primary);}
  .btn-next:disabled{opacity:0.3;cursor:not-allowed;}

  #screen-crystal{text-align:center;}
  .crystal-label{font-size:10px;letter-spacing:0.22em;color:var(--text-dim);text-transform:uppercase;font-weight:200;margin-bottom:32px;}
  #crystal-canvas{display:block;margin:0 auto;opacity:0;}
  .crystal-info{margin-top:28px;opacity:0;transition:opacity 0.8s;text-align:center;}
  .crystal-info.show{opacity:1;}
  .crystal-stage-name{font-size:10px;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;font-weight:200;margin-bottom:8px;}
  .crystal-stage-desc{font-size:clamp(14px,1.8vw,18px);font-weight:100;color:var(--text-secondary);max-width:380px;line-height:1.7;}
  .btn-take{margin-top:32px;padding:13px 44px;background:transparent;border:0.5px solid var(--border);color:var(--text-secondary);font-family:"Inter",sans-serif;font-size:11px;font-weight:200;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;opacity:0;transition:opacity 0.6s,border-color 0.3s,color 0.3s;}
  .btn-take.show{opacity:1;}
  .btn-take:hover{border-color:var(--text-secondary);color:var(--text-primary);}

  #screen-polaroid{gap:28px;}
  .polaroid{background:transparent;padding:0;box-shadow:none;transform:rotate(-1.5deg);opacity:0;transition:opacity 0.8s;}
  .polaroid.show{opacity:1;}
  .pol-canvas-wrap{background:#F5F2ED;width:260px;height:260px;}
  #polaroid-canvas{display:block;}
  .pol-bottom{padding-top:12px;text-align:center;}
  .pol-word{font-family:"Inter",sans-serif;font-size:11px;font-weight:100;color:var(--text-secondary);letter-spacing:0.08em;}
  .pol-brand{font-family:"Inter",sans-serif;font-size:8px;font-weight:100;letter-spacing:0.25em;color:#B4B0A8;margin-top:4px;}
  .pol-actions{display:flex;gap:10px;}
  .btn-act{padding:11px 26px;background:transparent;border:0.5px solid var(--border);color:var(--text-secondary);font-family:"Inter",sans-serif;font-size:11px;font-weight:200;letter-spacing:0.15em;cursor:pointer;transition:all 0.3s;text-transform:uppercase;}
  .btn-act:hover{border-color:var(--text-secondary);color:var(--text-primary);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .q-enter{animation:fadeUp 0.45s ease forwards;}
</style>
</head>

  <div class="wordmark">yora</div>
  <div class="tagline">A Living Digital Profile of Inner Growth</div>
  <div class="intro-desc">Four questions.<br>One form.<br>Something uniquely yours.</div>
  <button class="btn-start" id="btnstart" onclick="start()">Begin</button>
  <div class="privacy-note"><strong>Your data</strong>Your answers are not stored, sent, or saved anywhere. They exist only in this moment — and in your YORA.</div>
</div>

<div class="screen" id="screen-question">
  <div class="q-progress" id="qprog">
    <div class="q-dot active"></div><div class="q-dot"></div><div class="q-dot"></div><div class="q-dot"></div>
  </div>
  <div class="q-num" id="qnum">01 / 04</div>
  <div class="q-text" id="qtext"></div>
  <div class="q-area" id="qarea"></div>
  <button class="btn-next" id="btnnext" onclick="nextQ()" disabled>Continue</button>
</div>

<div class="screen" id="screen-crystal">
  <div class="crystal-label">Your YORA is forming</div>
  <canvas id="crystal-canvas" width="360" height="360"></canvas>
  <div class="crystal-info" id="cinfo">
    <div class="crystal-stage-name" id="csname"></div>
    <div class="crystal-stage-desc" id="csdesc"></div>
  </div>
  <button class="btn-take" id="btntake" onclick="showPol()">Take your YORA &#8594;</button>
</div>

<div class="screen" id="screen-polaroid">
  <div class="polaroid" id="polaroid">
    <div class="pol-canvas-wrap"><canvas id="polaroid-canvas" width="260" height="260"></canvas></div>
    <div class="pol-bottom">
      <div class="pol-word" id="polword"></div>
      <div class="pol-brand">Y O R A</div>
    </div>
  </div>
  <div class="pol-actions">
    <button class="btn-act" onclick="dl()">Download</button>
    <button class="btn-act" onclick="restart()">Start over</button>
  </div>
</div>

<script>
const Qs=[
  {id:"thing",text:"What are you working on these days?",type:"text",ph:"one word or short phrase..."},
  {id:"state",text:"How does it feel right now?",type:"choice",choices:["Flowing","Stuck","Unclear"]},
  {id:"dist",text:"How close do you feel to where you want to be?",type:"slider",min:1,max:5,labels:["not close at all","very close"]},
  {id:"vis",text:"Is this something you've shared with others?",type:"choice",choices:["Yes","Not really"]}
];
let curQ=0,ans={},fp={},animId=null;

function mkRand(seed){let s=seed;return function(){s=(s*9301+49297)%233280;return s/233280;};}

function go(toId){
  const current=document.querySelector(".screen.active");
  const next=document.getElementById(toId);
  if(!current||current===next){next.classList.add("active");return;}
  current.style.transition="opacity 0.45s ease, transform 0.45s ease";
  current.style.opacity="0";current.style.transform="scale(0.97)";
  setTimeout(()=>{
    current.classList.remove("active");current.style.transition="";current.style.opacity="";current.style.transform="";
    next.style.opacity="0";next.style.transform="scale(1.02)";next.classList.add("active");
    requestAnimationFrame(()=>{
      next.style.transition="opacity 0.5s ease, transform 0.5s ease";
      next.style.opacity="1";next.style.transform="scale(1)";
      setTimeout(()=>{next.style.transition="";next.style.opacity="";next.style.transform="";},500);
    });
  },450);
}

function start(){go("screen-question");renderQ(0);}

// mobile touch support
document.addEventListener("DOMContentLoaded",function(){
  var btnstart=document.getElementById("btnstart");
  if(btnstart){
    btnstart.addEventListener("touchend",function(e){e.preventDefault();start();},false);
  }
  var btnnext=document.getElementById("btnnext");
  if(btnnext){
    btnnext.addEventListener("touchend",function(e){e.preventDefault();nextQ();},false);
  }
});

function animateWords(el,text,baseDelay){
  el.style.visibility="hidden";
  setTimeout(()=>{
    el.innerHTML="";el.style.visibility="visible";
    text.split(" ").forEach((word,i)=>{
      const span=document.createElement("span");
      span.style.cssText="display:inline-block;opacity:0;transform:translateY(8px);transition:opacity 0.35s ease,transform 0.35s ease;margin-right:0.25em;";
      span.textContent=word;el.appendChild(span);
      setTimeout(()=>{span.style.opacity="1";span.style.transform="translateY(0)";},i*55);
    });
  },baseDelay);
}

function renderQ(idx){
  curQ=idx;const q=Qs[idx];
  document.querySelectorAll(".q-dot").forEach((d,i)=>{d.classList.remove("active","done");if(i<idx)d.classList.add("done");if(i===idx)d.classList.add("active");});
  document.getElementById("qnum").textContent="0"+(idx+1)+" / 04";
  animateWords(document.getElementById("qtext"),q.text,80);
  const area=document.getElementById("qarea"),btn=document.getElementById("btnnext");
  btn.disabled=true;
  area.style.transition="opacity 0.3s ease, transform 0.3s ease";
  area.style.opacity="0";area.style.transform="translateX(-30px)";
  setTimeout(()=>{
    area.innerHTML="";area.style.transform="translateX(30px)";
    if(q.type==="text")mkText(q,btn,area);
    else if(q.type==="choice")mkChoiceStagger(q,btn,area);
    else if(q.type==="slider")mkSliderStagger(q,btn,area);
    requestAnimationFrame(()=>{
      area.style.transition="opacity 0.4s ease, transform 0.4s ease";
      area.style.opacity="1";area.style.transform="translateX(0)";
      setTimeout(()=>{area.style.transition="";area.style.opacity="";area.style.transform="";},400);
    });
  },300);
}

function mkText(q,btn,area){
  const inp=document.createElement("input");inp.type="text";inp.className="text-input";inp.placeholder=q.ph;inp.maxLength=60;
  inp.style.cssText="opacity:0;transform:translateY(10px);transition:opacity 0.4s ease 0.1s,transform 0.4s ease 0.1s;";
  inp.addEventListener("input",()=>{ans[q.id]=inp.value.trim();btn.disabled=inp.value.trim().length<2;});
  area.appendChild(inp);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{inp.style.opacity="1";inp.style.transform="translateY(0)";}));
  setTimeout(()=>inp.focus(),300);
}

function mkChoiceStagger(q,btn,area){
  const g=document.createElement("div");g.className="choices";
  q.choices.forEach((c,i)=>{
    const b=document.createElement("button");b.className="choice-btn";b.textContent=c;
    b.style.cssText="opacity:0;transform:translateY(12px);transition:opacity 0.35s ease,transform 0.35s ease,border-color 0.25s,color 0.25s;";
    b.onclick=()=>{g.querySelectorAll(".choice-btn").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");ans[q.id]=c;btn.disabled=false;};
    g.appendChild(b);
    setTimeout(()=>{b.style.opacity="1";b.style.transform="translateY(0)";},100+i*90);
  });
  area.appendChild(g);
}

function mkSliderStagger(q,btn,area){
  const w=document.createElement("div");w.className="slider-wrap";
  w.style.cssText="opacity:0;transform:translateY(12px);transition:opacity 0.4s ease 0.1s,transform 0.4s ease 0.1s;";
  const lbl=document.createElement("div");lbl.className="slider-labels";lbl.innerHTML="<span>"+q.labels[0]+"</span><span>"+q.labels[1]+"</span>";
  const sl=document.createElement("input");sl.type="range";sl.className="slider";sl.min=q.min;sl.max=q.max;sl.value=3;
  const val=document.createElement("div");val.className="slider-val";val.textContent="3 / 5";
  ans[q.id]=3;btn.disabled=false;
  sl.addEventListener("input",()=>{ans[q.id]=parseInt(sl.value);val.textContent=sl.value+" / 5";});
  w.appendChild(lbl);w.appendChild(sl);w.appendChild(val);area.appendChild(w);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{w.style.opacity="1";w.style.transform="translateY(0)";}));
}

function nextQ(){
  const btn=document.getElementById("btnnext");
  btn.style.transform="scale(0.96)";setTimeout(()=>{btn.style.transform="";},200);
  if(curQ<Qs.length-1){renderQ(curQ+1);}
  else{
    computeForm();go("screen-crystal");
    setTimeout(()=>{
      const canvas=document.getElementById("crystal-canvas");
      canvas.style.transition="opacity 0.8s ease";canvas.style.opacity="1";
      doAnimate();
    },500);
  }
}

function computeForm(){
  const thing=ans["thing"]||"something",state=ans["state"]||"Flowing",dist=ans["dist"]||3,vis=ans["vis"]||"";
  let seed=0;
  for(let i=0;i<thing.length;i++) seed=seed*31+thing.charCodeAt(i)*(i+1);
  seed+=dist*7919;seed+=(vis==="Yes"?3571:1307);
  seed+=(state==="Flowing"?2003:state==="Stuck"?4007:6011);
  seed=Math.abs(seed*1000003)%999983;
  let seed2=seed;
  for(let i=0;i<thing.length;i++) seed2=seed2*37+thing.charCodeAt(thing.length-1-i)*(i+2);
  seed2=Math.abs(seed2)%999979;
  const wordFactor=Math.min(thing.length,12)/12;
  const visFactor=(vis==="Yes")?1:0;
  const stageFloat=(dist-1)/4*4+wordFactor+visFactor*0.5+(seed%100)/200;
  let stage=Math.round(stageFloat)+1;stage=Math.max(1,Math.min(6,stage));
  const allPalettes={
    "Flowing":[
      [{r:32,g:178,b:210},{r:24,g:140,b:180},{r:56,g:210,b:190},{r:18,g:100,b:160},{r:80,g:220,b:200},{r:40,g:160,b:220}],
      [{r:34,g:160,b:80},{r:80,g:200,b:100},{r:24,g:120,b:60},{r:120,g:210,b:80},{r:50,g:180,b:120},{r:160,g:220,b:60}],
      [{r:80,g:200,b:180},{r:120,g:160,b:220},{r:60,g:220,b:160},{r:160,g:120,b:220},{r:40,g:180,b:200},{r:100,g:240,b:180}],
      [{r:40,g:80,b:180},{r:80,g:120,b:220},{r:20,g:60,b:160},{r:100,g:160,b:240},{r:60,g:100,b:200},{r:140,g:180,b:255}],
      [{r:60,g:220,b:140},{r:140,g:240,b:80},{r:40,g:180,b:120},{r:180,g:240,b:100},{r:80,g:200,b:160},{r:160,g:255,b:120}]
    ],
    "Stuck":[
      [{r:220,g:60,b:40},{r:240,g:120,b:20},{r:200,g:40,b:80},{r:255,g:80,b:20},{r:180,g:20,b:60},{r:255,g:140,b:40}],
      [{r:140,g:60,b:200},{r:200,g:80,b:160},{r:100,g:40,b:180},{r:220,g:100,b:180},{r:120,g:20,b:160},{r:180,g:60,b:220}],
      [{r:200,g:80,b:40},{r:160,g:40,b:80},{r:220,g:120,b:60},{r:180,g:60,b:120},{r:240,g:100,b:40},{r:200,g:140,b:80}],
      [{r:80,g:20,b:140},{r:120,g:40,b:180},{r:160,g:60,b:200},{r:60,g:10,b:120},{r:200,g:80,b:220},{r:100,g:30,b:160}],
      [{r:240,g:40,b:20},{r:200,g:20,b:60},{r:255,g:100,b:40},{r:180,g:10,b:40},{r:255,g:60,b:60},{r:220,g:80,b:20}]
    ],
    "Unclear":[
      [{r:120,g:130,b:160},{r:160,g:150,b:140},{r:100,g:110,b:150},{r:180,g:170,b:150},{r:130,g:140,b:170},{r:150,g:140,b:130}],
      [{r:100,g:110,b:120},{r:140,g:130,b:120},{r:80,g:90,b:110},{r:160,g:150,b:130},{r:110,g:120,b:140},{r:140,g:120,b:110}],
      [{r:160,g:120,b:140},{r:180,g:140,b:120},{r:140,g:100,b:130},{r:200,g:160,b:140},{r:160,g:130,b:150},{r:180,g:120,b:110}],
      [{r:80,g:100,b:140},{r:100,g:120,b:160},{r:60,g:80,b:130},{r:120,g:140,b:180},{r:90,g:110,b:150},{r:110,g:100,b:140}],
      [{r:150,g:140,b:130},{r:170,g:150,b:120},{r:130,g:120,b:110},{r:190,g:170,b:140},{r:140,g:130,b:120},{r:160,g:140,b:110}]
    ]
  };
  const paletteIdx=seed%5;
  const colors=(allPalettes[state]||allPalettes["Flowing"])[paletteIdx];
  const stageData=[
    {name:"Origin",desc:"Something is here. Not yet open. But alive."},
    {name:"Radial Growth",desc:"Thought begins to expand outward. Curiosity activated."},
    {name:"Layer Expansion",desc:"Depth through return. Reflection accumulates."},
    {name:"Node Generation",desc:"Connections emerge. Ideas begin relating."},
    {name:"Angle Divergence",desc:"Individuality appears. Unique pathways forming."},
    {name:"Identity",desc:"Identity becomes visible. Proof of becoming."}
  ];
  fp={seed,seed2,stage,colors,vis,thing,state,dist};
  document.getElementById("csname").textContent=stageData[stage-1].name;
  document.getElementById("csdesc").textContent=stageData[stage-1].desc;
}

function doAnimate(){
  cancelAnimationFrame(animId);
  const canvas=document.getElementById("crystal-canvas"),ctx=canvas.getContext("2d"),dur=5000,t0=performance.now();
  function frame(now){
    const raw=Math.min((now-t0)/dur,1),p=raw<0.5?2*raw*raw:-1+(4-2*raw)*raw;
    drawYORA(ctx,canvas.width,canvas.height,p,fp);
    if(raw<1)animId=requestAnimationFrame(frame);
    else{
      setTimeout(()=>document.getElementById("cinfo").classList.add("show"),300);
      setTimeout(()=>document.getElementById("btntake").classList.add("show"),700);
    }
  }
  requestAnimationFrame(frame);
}

function drawYORA(ctx,W,H,p,params){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle="#F5F2ED";ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2,{seed,stage,colors,vis}=params,rand=mkRand(seed);
  const rand2=fp.seed2?mkRand(fp.seed2):rand;
  if(p>0.05){const c=colors[0],g=ctx.createRadialGradient(cx,cy,0,cx,cy,160*p);g.addColorStop(0,"rgba("+c.r+","+c.g+","+c.b+",0.08)");g.addColorStop(1,"rgba(0,0,0,0)");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
  drawOrigin(ctx,cx,cy,Math.min(p*3,1),colors[0],rand);
  if(stage>=2&&p>0.08)drawMesh(ctx,cx,cy,Math.min((p-0.05)*1.4,1),colors,stage,rand,rand2,vis);
  if(stage>=4&&p>0.4)drawSatellites(ctx,cx,cy,Math.min((p-0.35)*2.5,1),colors,stage,rand);
  if(stage>=6&&p>0.6)drawIdentityRing(ctx,cx,cy,Math.min((p-0.55)*3,1),colors,rand);
}

function drawOrigin(ctx,cx,cy,p,color,rand){
  for(let l=0;l<4;l++){const r=(18+l*20)*p;ctx.beginPath();for(let i=0;i<=64;i++){const a=(i/64)*Math.PI*2,w=rand()*10-5,x=cx+Math.cos(a)*(r+w),y=cy+Math.sin(a)*(r+w);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.strokeStyle="rgba("+color.r+","+color.g+","+color.b+","+(0.12*p)+")";ctx.lineWidth=0.5;ctx.stroke();}
  ctx.beginPath();ctx.moveTo(cx-32*p,cy);ctx.lineTo(cx+32*p,cy);ctx.moveTo(cx,cy-32*p);ctx.lineTo(cx,cy+32*p);ctx.strokeStyle="rgba("+color.r+","+color.g+","+color.b+","+(0.18*p)+")";ctx.lineWidth=0.4;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,2.5*p,0,Math.PI*2);ctx.fillStyle="rgba("+color.r+","+color.g+","+color.b+","+(p*0.9)+")";ctx.fill();
  if(p>0.5){ctx.beginPath();ctx.arc(cx,cy,1.2*p,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,"+((p-0.5)*2*0.9)+")";ctx.fill();}
}

function drawMesh(ctx,cx,cy,p,colors,stage,rand,rand2,vis){
  const baseArms=4+stage*2+((vis==="Yes")?2:0);
  const bonusArms=Math.floor(rand2()*stage);
  const armCount=baseArms+bonusArms,arms=[];
  for(let i=0;i<armCount;i++){
    const baseAngle=(i/armCount)*Math.PI*2;
    const angleOffset=(rand()-0.5)*1.2+(rand2()-0.5)*0.4;
    const angle=baseAngle+angleOffset;
    const maxLen=40+rand()*120+stage*18+rand2()*40;
    const colorIdx=i%colors.length;
    const ptCount=3+Math.floor(rand()*3);
    const pts=[{x:cx,y:cy}];
    for(let j=0;j<ptCount;j++){
      const spread=(rand()-0.5)*60*(1+stage*0.25)+(rand2()-0.5)*30;
      const perpA=angle+Math.PI/2;
      const dist=maxLen*((j+1)/ptCount)*p;
      pts.push({x:cx+Math.cos(angle)*dist+Math.cos(perpA)*spread*p,y:cy+Math.sin(angle)*dist+Math.sin(perpA)*spread*p});
    }
    arms.push({pts,colorIdx});
  }
  for(let i=0;i<arms.length;i++){
    const armA=arms[i],armB=arms[(i+1)%arms.length],c=colors[armA.colorIdx];
    const steps=Math.min(armA.pts.length,armB.pts.length)-1;
    for(let s=0;s<steps;s++){
      const pA0=armA.pts[s],pA1=armA.pts[s+1],pB0=armB.pts[s],pB1=armB.pts[s+1];
      const alpha=(0.08+rand()*0.06)*p,sa=(0.3+rand()*0.2)*p;
      ctx.beginPath();ctx.moveTo(pA0.x,pA0.y);ctx.lineTo(pA1.x,pA1.y);ctx.lineTo(pB0.x,pB0.y);ctx.closePath();
      ctx.fillStyle="rgba("+c.r+","+c.g+","+c.b+","+alpha+")";ctx.fill();
      ctx.strokeStyle="rgba("+c.r+","+c.g+","+c.b+","+sa+")";ctx.lineWidth=0.5;ctx.stroke();
      ctx.beginPath();ctx.moveTo(pA1.x,pA1.y);ctx.lineTo(pB1.x,pB1.y);ctx.lineTo(pB0.x,pB0.y);ctx.closePath();
      ctx.fillStyle="rgba("+c.r+","+c.g+","+c.b+","+(alpha*0.8)+")";ctx.fill();
      ctx.strokeStyle="rgba("+c.r+","+c.g+","+c.b+","+(sa*0.8)+")";ctx.lineWidth=0.4;ctx.stroke();
    }
    armA.pts.forEach((pt,idx)=>{
      if(idx===0)return;
      const r=idx===armA.pts.length-1?2.5+rand()*1.5:1.2+rand()*1;
      ctx.beginPath();ctx.arc(pt.x,pt.y,r*p,0,Math.PI*2);
      ctx.fillStyle="rgba("+c.r+","+c.g+","+c.b+","+(0.7*p)+")";ctx.fill();
    });
  }
  if(stage>=3)for(let i=0;i<arms.length;i++)for(let j=i+2;j<arms.length;j++){
    const pA=arms[i].pts[Math.floor(arms[i].pts.length*0.6)];
    const pB=arms[j].pts[Math.floor(arms[j].pts.length*0.6)];
    const c=colors[i%colors.length],d=Math.hypot(pB.x-pA.x,pB.y-pA.y);
    if(d<180){ctx.beginPath();ctx.moveTo(pA.x,pA.y);ctx.lineTo(pB.x,pB.y);ctx.strokeStyle="rgba("+c.r+","+c.g+","+c.b+","+((1-d/180)*0.12*p)+")";ctx.lineWidth=0.3;ctx.stroke();}
  }
}

function drawSatellites(ctx,cx,cy,p,colors,stage,rand){
  const count=stage>=6?6:4;
  for(let i=0;i<count;i++){
    const a=rand()*Math.PI*2,dist=(100+rand()*60)*p;
    const sx=cx+Math.cos(a)*dist,sy=cy+Math.sin(a)*dist;
    const c=colors[i%colors.length],size=(8+rand()*20)*p;
    const localPts=[{x:sx,y:sy}];
    const ptCount=3+Math.floor(rand()*4);
    for(let j=0;j<ptCount;j++)localPts.push({x:sx+(rand()-0.5)*size*2,y:sy+(rand()-0.5)*size*2});
    for(let j=1;j<localPts.length-1;j++){
      ctx.beginPath();ctx.moveTo(localPts[0].x,localPts[0].y);ctx.lineTo(localPts[j].x,localPts[j].y);ctx.lineTo(localPts[j+1].x,localPts[j+1].y);ctx.closePath();
      ctx.fillStyle="rgba("+c.r+","+c.g+","+c.b+","+(0.08*p)+")";ctx.fill();
      ctx.strokeStyle="rgba("+c.r+","+c.g+","+c.b+","+(0.35*p)+")";ctx.lineWidth=0.4;ctx.stroke();
    }
    localPts.forEach(pt=>{ctx.beginPath();ctx.arc(pt.x,pt.y,1.5*p,0,Math.PI*2);ctx.fillStyle="rgba("+c.r+","+c.g+","+c.b+","+(0.6*p)+")";ctx.fill();});
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(sx,sy);ctx.strokeStyle="rgba("+c.r+","+c.g+","+c.b+","+(0.08*p)+")";ctx.lineWidth=0.3;ctx.stroke();
  }
}

function drawIdentityRing(ctx,cx,cy,p,colors,rand){
  const r=155;ctx.beginPath();ctx.arc(cx,cy,r*p,0,Math.PI*2);
  ctx.strokeStyle="rgba("+colors[0].r+","+colors[0].g+","+colors[0].b+","+(0.08*p)+")";ctx.lineWidth=0.4;ctx.stroke();
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2,nr=r*(0.9+rand()*0.2);
    const nx=cx+Math.cos(a)*nr*p,ny=cy+Math.sin(a)*nr*p,c=colors[i%colors.length];
    ctx.beginPath();ctx.arc(nx,ny,1*p,0,Math.PI*2);ctx.fillStyle="rgba("+c.r+","+c.g+","+c.b+","+(0.4*p)+")";ctx.fill();
  }
}

function showPol(){
  go("screen-polaroid");
  setTimeout(()=>{
    const canvas=document.getElementById("polaroid-canvas"),ctx=canvas.getContext("2d");
    ctx.fillStyle="#F5F2ED";ctx.fillRect(0,0,260,260);
    drawYORA(ctx,260,260,1.0,fp);
    const sm={"Flowing":"flowing","Stuck":"held in place","Unclear":"finding clarity"};
    document.getElementById("polword").textContent='"'+fp.thing+'" — '+(sm[fp.state]||"");
    setTimeout(()=>document.getElementById("polaroid").classList.add("show"),200);
  },400);
}

function dl(){
  try{
    var W=543,H=732,scale=2;
    var full=document.createElement("canvas");full.width=W*scale;full.height=H*scale;
    var ctx=full.getContext("2d");
    ctx.scale(scale,scale);
    ctx.fillStyle="#F5F2ED";ctx.fillRect(0,0,W,H);
    ctx.save();
    var fs=W/360;ctx.scale(fs,fs);
    drawYORA(ctx,360,H/fs,1.0,fp);
    ctx.restore();
    ctx.fillStyle="#E8E4DE";ctx.fillRect(0,H-52,W,52);
    var sm={"Flowing":"flowing","Stuck":"held in place","Unclear":"finding clarity"};
    ctx.fillStyle="#5A5855";ctx.font="200 28px Inter,sans-serif";ctx.textAlign="center";
    ctx.fillText('"'+fp.thing+'" — '+(sm[fp.state]||""),W/2,H-28);
    ctx.fillStyle="#B4B0A8";ctx.font="200 20px Inter,sans-serif";
    ctx.fillText("Y  O  R  A",W/2,H-6);
    full.toBlob(function(blob){
      if(!blob)return;
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.download="yora-"+fp.thing.replace(/\s+/g,"-")+".png";
      a.href=url;document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},1000);
    },"image/png");
  }catch(e){console.error(e);}
}

function restart(){
  ans={};fp={};cancelAnimationFrame(animId);
  document.getElementById("crystal-canvas").style.opacity="0";
  document.getElementById("cinfo").classList.remove("show");
  document.getElementById("btntake").classList.remove("show");
  document.getElementById("polaroid").classList.remove("show");
  go("screen-intro");
}
</script>
